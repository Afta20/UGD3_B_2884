<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Login SIWEB</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
<h2>Form Login SIWEB</h2>

<div class="input-group">
<label for="username">Username:</label>
<input type="text" id="username" autocomplete="off">
<span id="err-username" class="error-message"></span>
</div>

<div class="input-group">
<label for="password">Password:</label>
<input type="password" id="password">
<span id="err-password" class="error-message"></span>
</div>

<button id="btnLogin" class="btn-login">Login</button>
</div>

<script>
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const btnLogin = document.getElementById("btnLogin");
const errUsername = document.getElementById("err-username");
const errPassword = document.getElementById("err-password");

const akunValid = {
username: "admin",
password: "akuadmin"}

btnLogin.addEventListener("click", function() {
errUsername.innerText = "";
errPassword.innerText = "";

const userVal = usernameInput.value;
const passVal = passwordInput.value;

let validasiLolos = true;

if (userVal === "") {
errUsername.innerText = "Username wajib diisi!";
validasiLolos = false;
}

if (passVal === "") {
errPassword.innerText = "Password wajib diisi!";
validasiLolos = false;
}

if (!validasiLolos) {
return;
}

if (userVal === akunValid.username && passVal === akunValid.password) {
window.location.href = "https://instagram.com/makeitfta_";
} else if (userVal !== akunValid.username && passVal === akunValid.password) {
errUsername.innerText = "Username salah!";
} else if (userVal === akunValid.username && passVal !== akunValid.password) {
errPassword.innerText = "Password salah!";
} else {
errPassword.innerText = "Username atau password salah!";
}
});
</script>
</body>
</html>
